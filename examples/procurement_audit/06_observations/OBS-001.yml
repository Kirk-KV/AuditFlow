risk_id: R-001
risk_title: Unauthorized purchases
control_id: C-001
control_description: PO release after approval
control_owner: Procurement Department
title: Purchase orders released before required approval
severity: High
condition: 'The audit identified 38 purchase orders where the recorded release timestamp preceded approval completion. After
  removing obvious technical false positives, 31 cases remained confirmed or unresolved. Several cases were concentrated around
  urgent purchases and a small number of requesters, and documented emergency approval evidence was not available for all
  reviewed cases.

  '
criteria: 'Purchase orders should be released only after the required approval has been completed, except where a formally
  defined and evidenced emergency approval process applies.

  '
cause: 'The workflow allowed purchase orders to be released before approval completion, and the emergency purchase process
  was not consistently evidenced or monitored.

  '
risk_effect: 'Purchases may be committed without proper authorization, weakening approval discipline and increasing the risk
  of unauthorized or inappropriate procurement activity.

  '
recommendation: Configure the procurement workflow to prevent release before required approval, define and evidence any emergency
  approval process, and implement periodic monitoring of release-before-approval exceptions with assigned ownership for review
  and remediation.
